<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>World Clock</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --text-secondary: rgba(255,255,255,0.55);
    --accent: #ff9f0a;
    --accent2: #30d158;
    --danger: #ff453a;
    --blue: #0a84ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 0 40px;
  }

  .phone {
    width: 393px;
    min-height: 852px;
    background: var(--bg);
    border-radius: 54px;
    box-shadow: 0 0 0 10px #1a1a1a, 0 0 0 12px #2a2a2a, 0 40px 80px rgba(0,0,0,0.8);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Notch */
  .notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 37px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .notch-camera { width: 12px; height: 12px; background: #1a1a1a; border-radius: 50%; border: 2px solid #222; }
  .notch-speaker { width: 50px; height: 5px; background: #1a1a1a; border-radius: 3px; }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 0;
    height: 54px;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { fill: white; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
    scrollbar-width: none;
  }
  .content::-webkit-scrollbar { display: none; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 12px 4px 16px;
  }
  .header-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
  .edit-btn {
    font-size: 17px;
    color: var(--accent);
    font-weight: 400;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }

  /* Search */
  .search-wrap {
    margin-bottom: 20px;
    position: relative;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: none;
    border-radius: 12px;
    padding: 10px 16px 10px 38px;
    color: var(--text);
    font-size: 17px;
    font-family: inherit;
    outline: none;
    transition: background 0.2s;
  }
  .search-input::placeholder { color: var(--text-secondary); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 16px;
    pointer-events: none;
  }
  .search-results {
    display: none;
    background: var(--surface);
    border-radius: 12px;
    margin-top: 4px;
    overflow: hidden;
    max-height: 280px;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .search-results.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .search-item {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover, .search-item:active { background: var(--surface2); }
  .search-item-flag { font-size: 22px; }
  .search-item-info { flex: 1; }
  .search-item-city { font-size: 16px; font-weight: 500; }
  .search-item-country { font-size: 13px; color: var(--text-secondary); }
  .search-item-add {
    color: var(--blue);
    font-size: 13px;
    font-weight: 500;
    background: rgba(10,132,255,0.15);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* Section */
  .section-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    padding: 0 4px 8px;
  }

  /* Clock card */
  .clock-list { display: flex; flex-direction: column; gap: 1px; margin-bottom: 28px; }

  .clock-card {
    background: var(--surface);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }
  .clock-card.animate-in {
    animation: slideIn 0.3s ease forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .clock-card:first-child { border-radius: 14px 14px 0 0; }
  .clock-card:last-child { border-radius: 0 0 14px 14px; }
  .clock-card:only-child { border-radius: 14px; }
  .clock-card + .clock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 18px; right: 0;
    height: 1px;
    background: var(--border);
  }
  .clock-card:active { background: var(--surface2); }

  .clock-flag { font-size: 32px; flex-shrink: 0; }
  .clock-info { flex: 1; min-width: 0; }
  .clock-city { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clock-country { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
  .clock-diff {
    font-size: 12px;
    margin-top: 4px;
    font-weight: 500;
  }
  .clock-diff.ahead { color: var(--accent2); }
  .clock-diff.behind { color: var(--accent); }
  .clock-diff.same { color: var(--text-secondary); }

  .clock-time-wrap { text-align: right; flex-shrink: 0; }
  .clock-time {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: -1.5px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .clock-ampm { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
  .clock-date { font-size: 12px; color: var(--text-secondary); }

  /* Delete swipe */
  .delete-btn {
    display: none;
    position: absolute;
    right: 0; top: 0; bottom: 0;
    background: var(--danger);
    color: white;
    border: none;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    align-items: center;
  }

  /* Analog mini */
  .analog-clock { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
  .analog-face {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom center;
    border-radius: 2px;
  }
  .hour-hand { width: 3px; height: 30%; background: white; margin-left: -1.5px; }
  .min-hand { width: 2px; height: 40%; background: rgba(255,255,255,0.8); margin-left: -1px; }
  .sec-hand { width: 1px; height: 42%; background: var(--accent); margin-left: -0.5px; }
  .center-dot {
    position: absolute;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
  }
  .empty-state .globe { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; line-height: 1.5; }

  /* My time card */
  .my-time-card {
    background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
    border: 1px solid rgba(255,159,10,0.2);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .my-time-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(255,159,10,0.1) 0%, transparent 70%);
  }
  .my-time-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
  .my-time-display { font-size: 56px; font-weight: 200; letter-spacing: -3px; line-height: 1; font-variant-numeric: tabular-nums; }
  .my-time-sub { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .my-time-date { font-size: 14px; color: var(--text-secondary); }
  .my-time-zone { font-size: 13px; color: var(--text-secondary); }
</style>
</head>

function getTimeInZone(tz) {
  const now = new Date();
  return new Date(now.toLocaleString('en-US', { timeZone: tz }));
}

function getLocalOffset(tz) {
  const now = new Date();
  const local = now;
  const remote = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const diff = (remote - local) / 1000 / 3600;
  return diff;
}

function formatDiff(diff) {
  if (Math.abs(diff) < 0.05) return { text: "Same time", cls: "same" };
  const totalMins = Math.round(Math.abs(diff) * 60);
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  let s = '';
  if (h) s += `${h}h`;
  if (m) s += `${h ? ' ' : ''}${m}m`;
  return diff > 0
    ? { text: `+${s} ahead`, cls: "ahead" }
    : { text: `${s} behind`, cls: "behind" };
}

const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function buildClocks(newIndex) {
  const list = document.getElementById('clockList');
  list.innerHTML = '';
  if (!savedClocks.length) {
    list.innerHTML = `<div class="empty-state"><div class="globe">🌍</div><p>Search for a city above to add it to your world clock.</p></div>`;
    return;
  }
  savedClocks.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'clock-card' + (i === newIndex ? ' animate-in' : '');
    card.dataset.index = i;
    card.dataset.tz = c.tz;
    card.innerHTML = `
      <div class="analog-clock">
        <div class="analog-face">
          <div class="hand hour-hand"></div>
          <div class="hand min-hand"></div>
          <div class="hand sec-hand"></div>
          <div class="center-dot"></div>
        </div>
      </div>
      <div class="clock-info">
        <div class="clock-city">${c.city}</div>
        <div class="clock-country">${c.country}</div>
        <div class="clock-diff"></div>
      </div>
      <div class="clock-time-wrap">
        <div class="clock-time"></div>
        <div class="clock-ampm"></div>
        <div class="clock-date"></div>
      </div>
    `;
    list.appendChild(card);
  });
  const cards = list.querySelectorAll('.clock-card');
  cards.forEach((card, i) => {
    if (cards.length === 1) card.style.borderRadius = '14px';
    else if (i === 0) card.style.borderRadius = '14px 14px 0 0';
    else if (i === cards.length - 1) card.style.borderRadius = '0 0 14px 14px';
    else card.style.borderRadius = '0';
  });
  updateClocks();
}

function updateClocks() {
  document.querySelectorAll('.clock-card').forEach(card => {
    const tz = card.dataset.tz;
    const t = getTimeInZone(tz);
    const h = t.getHours(), m = t.getMinutes(), s = t.getSeconds();
    const h12 = h % 12 || 12;
    const mStr = String(m).padStart(2, '0');
    const diff = formatDiff(getLocalOffset(tz));

    card.querySelector('.clock-time').textContent = `${h12}:${mStr}`;
    card.querySelector('.clock-ampm').textContent = h >= 12 ? 'PM' : 'AM';
    card.querySelector('.clock-date').textContent =
      `${DAYS_SHORT[t.getDay()]}, ${MONTHS_SHORT[t.getMonth()]} ${t.getDate()}`;
    const diffEl = card.querySelector('.clock-diff');
    diffEl.textContent = diff.text;
    diffEl.className = `clock-diff ${diff.cls}`;

    const hDeg = (h % 12) * 30 + m * 0.5;
    card.querySelector('.hour-hand').style.transform = `rotate(${hDeg}deg)`;
    card.querySelector('.min-hand').style.transform = `rotate(${m * 6}deg)`;
    card.querySelector('.sec-hand').style.transform = `rotate(${s * 6}deg)`;
  });
}

function updateMyTime() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const h12 = h % 12 || 12;
  const mStr = String(m).padStart(2, '0');
  document.getElementById('myTime').textContent = `${h12}:${mStr}`;
  document.getElementById('myDate').textContent =
    `${DAYS_LONG[now.getDay()]}, ${MONTHS_LONG[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('myZone').textContent =
    Intl.DateTimeFormat().resolvedOptions().timeZone.replace(/_/g, ' ');
  document.getElementById('statusTime').textContent = `${h12}:${mStr}`;
}

function tick() {
  updateMyTime();
  updateClocks();
}

// Search
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let searchDebounce = null;
let lastQuery = '';
let lastAIResults = [];

function showSearchLoading() {
  searchResults.innerHTML = '<div class="search-item" style="justify-content:center;color:var(--text-secondary);font-size:14px;gap:8px;"><span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;"></span>&nbsp;Searching…</div>';
  searchResults.classList.add('visible');
}

function renderSearchResults(results) {
  if (!results.length) {
    searchResults.innerHTML = '<div class="search-item" style="color:var(--text-secondary);font-size:14px;">No cities found</div>';
  } else {
    searchResults.innerHTML = results.map((c, idx) => {
      const already = savedClocks.some(s => s.city === c.city && s.tz === c.tz);
      return `<div class="search-item" onclick="addClockFromResult(${idx})">
        <span class="search-item-flag">${c.flag}</span>
        <div class="search-item-info">
          <div class="search-item-city">${c.city}</div>
          <div class="search-item-country">${c.country}</div>
        </div>
        ${already
          ? '<span class="search-item-add" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3)">Added</span>'
          : '<span class="search-item-add">+ Add</span>'}
      </div>`;
    }).join('');
  }
  searchResults.classList.add('visible');
}

async function aiSearch(q) {
  const localMatches = CITIES.filter(c =>
    c.city.toLowerCase().includes(q.toLowerCase()) || c.country.toLowerCase().includes(q.toLowerCase())
  ).slice(0, 5);

  if (localMatches.length) {
    lastAIResults = localMatches;
    renderSearchResults(localMatches);
  } else {
    showSearchLoading();
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: 'The user typed "' + q + '" into a world clock city search. Return up to 6 matching cities as a JSON array. Each object must have: city (string), country (string), tz (valid IANA timezone string e.g. "America/New_York"), flag (country flag emoji). Only return the raw JSON array, no markdown, no explanation. If the query does not match any real city return [].'
        }]
      })
    });
    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('').trim().replace(/```json|```/g, '').trim();
    const results = JSON.parse(text);
    if (Array.isArray(results) && results.length) {
      const seen = new Set(localMatches.map(c => c.city + '|' + c.tz));
      const aiOnly = results.filter(c => !seen.has(c.city + '|' + c.tz));
      lastAIResults = [...localMatches, ...aiOnly].slice(0, 8);
      renderSearchResults(lastAIResults);
    } else if (!localMatches.length) {
      lastAIResults = [];
      renderSearchResults([]);
    }
  } catch (e) {
    if (!localMatches.length) {
      searchResults.innerHTML = '<div class="search-item" style="color:var(--text-secondary);font-size:14px;">Search unavailable</div>';
    }
  }
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { searchResults.classList.remove('visible'); lastAIResults = []; lastQuery = ''; return; }
  if (q === lastQuery) return;
  lastQuery = q;
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => aiSearch(q), 350);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.classList.remove('visible');
});

function addClockFromResult(idx) {
  const c = lastAIResults[idx];
  if (!c) return;
  if (!savedClocks.some(s => s.city === c.city && s.tz === c.tz)) {
    savedClocks.push(c);
    localStorage.setItem('worldClocks', JSON.stringify(savedClocks));
    buildClocks(savedClocks.length - 1);
  }
  searchInput.value = '';
  searchResults.classList.remove('visible');
  lastAIResults = [];
  lastQuery = '';
}

function addClock(city) {
  const c = CITIES.find(x => x.city === city);
  if (!c || savedClocks.some(s => s.city === c.city && s.tz === c.tz)) return;
  savedClocks.push(c);
  localStorage.setItem('worldClocks', JSON.stringify(savedClocks));
  buildClocks(savedClocks.length - 1);
  searchInput.value = '';
  searchResults.classList.remove('visible');
}

let editMode = false;
function toggleEdit() {
  editMode = !editMode;
  document.querySelector('.edit-btn').textContent = editMode ? 'Done' : 'Edit';
  // simple long-press delete
}

// Long press to delete
let pressTimer;
document.getElementById('clockList').addEventListener('mousedown', e => {
  const card = e.target.closest('.clock-card');
  if (!card) return;
  pressTimer = setTimeout(() => {
    const i = parseInt(card.dataset.index);
    if (confirm(`Remove ${savedClocks[i].city}?`)) {
      savedClocks.splice(i, 1);
      localStorage.setItem('worldClocks', JSON.stringify(savedClocks));
      buildClocks();
    }
  }, 600);
});
document.getElementById('clockList').addEventListener('mouseup', () => clearTimeout(pressTimer));
document.getElementById('clockList').addEventListener('mouseleave', () => clearTimeout(pressTimer));

// Touch support for delete
document.getElementById('clockList').addEventListener('touchstart', e => {
  const card = e.target.closest('.clock-card');
  if (!card) return;
  pressTimer = setTimeout(() => {
    const i = parseInt(card.dataset.index);
    if (confirm(`Remove ${savedClocks[i].city}?`)) {
      savedClocks.splice(i, 1);
      localStorage.setItem('worldClocks', JSON.stringify(savedClocks));
      buildClocks();
    }
  }, 600);
}, { passive: true });
document.getElementById('clockList').addEventListener('touchend', () => clearTimeout(pressTimer));

buildClocks();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
